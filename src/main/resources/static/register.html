<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar conta – Rádio Verde</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .register-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 22px;
      justify-content: space-evenly;
      padding: 28px;
    }

    .register-box {
      padding: 22px;
      border-radius: 22px;
      border: 1px solid var(--soft-border);
      background: var(--soft-surface);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .register-box label {
      display: block;
      margin-bottom: 6px;
      color: #d6fbe5;
      font-size: 14px;
      font-weight: 600;
    }

    .field-group {
      display: flex;
      flex-direction: column;
    }

    .register-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 6px;
    }

    .register-actions button {
      width: 100%;
    }

    .login-link {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
    }

    .login-link a {
      color: var(--green-soft);
      font-weight: 700;
      text-decoration: none;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    .feedback-msg {
      display: none;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
    }

    .feedback-msg.error {
      display: block;
      background: rgba(239, 68, 68, 0.14);
      border: 1px solid rgba(239, 68, 68, 0.28);
      color: #fca5a5;
    }

    .feedback-msg.success {
      display: block;
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(74, 222, 128, 0.24);
      color: var(--green-soft);
    }

    @media (max-width: 768px) {
      .register-panel {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="chat-page">
    <section class="chat-app">
      <header class="chat-header">
        <div class="brand-block">
          <h1>Rádio Verde</h1>
        </div>
      </header>

      <section class="register-panel">
        <div class="welcome-copy">
          <h2>Crie sua conta para entrar no chat</h2>
        </div>

        <div class="register-box">
          <div id="feedbackMsg" class="feedback-msg" role="alert"></div>

          <div class="field-group">
            <label for="usernameInput">Nome de usuário</label>
            <input id="usernameInput" type="text" placeholder="Escolha um nome de usuário" maxlength="40" autocomplete="username">
          </div>

          <div class="field-group">
            <label for="passwordInput">Senha</label>
            <input id="passwordInput" type="password" placeholder="Crie uma senha" maxlength="80" autocomplete="new-password">
          </div>

          <div class="field-group">
            <label for="confirmPasswordInput">Confirmar senha</label>
            <input id="confirmPasswordInput" type="password" placeholder="Repita a senha" maxlength="80" autocomplete="new-password">
          </div>

          <div class="field-group">
            <label for="accessCodeInput">Código de acesso</label>
            <input id="accessCodeInput" type="password" placeholder="Informe o código de acesso" maxlength="40" autocomplete="off">
          </div>

          <div class="register-actions">
            <button id="registerButton" type="button">Criar conta</button>
          </div>

          <p class="login-link">Já tem uma conta? <a href="/index.html">Entrar</a></p>
        </div>
      </section>
    </section>
  </main>

  <script>
    const ACCESS_CODE = '123';

    const usernameInput = document.getElementById('usernameInput');
    const passwordInput = document.getElementById('passwordInput');
    const confirmPasswordInput = document.getElementById('confirmPasswordInput');
    const accessCodeInput = document.getElementById('accessCodeInput');
    const registerButton = document.getElementById('registerButton');
    const feedbackMsg = document.getElementById('feedbackMsg');

    function showFeedback(message, type) {
      feedbackMsg.textContent = message;
      feedbackMsg.className = 'feedback-msg ' + type;
    }

    function clearFeedback() {
      feedbackMsg.textContent = '';
      feedbackMsg.className = 'feedback-msg';
    }

    async function register() {
      clearFeedback();

      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;
      const accessCode = accessCodeInput.value;

      if (!username) {
        showFeedback('Informe um nome de usuário.', 'error');
        usernameInput.focus();
        return;
      }

      if (!password) {
        showFeedback('Informe uma senha.', 'error');
        passwordInput.focus();
        return;
      }

      if (password !== confirmPassword) {
        showFeedback('As senhas não coincidem.', 'error');
        confirmPasswordInput.focus();
        return;
      }

      if (accessCode !== ACCESS_CODE) {
        showFeedback('Código de acesso inválido.', 'error');
        accessCodeInput.focus();
        return;
      }

      registerButton.disabled = true;
      registerButton.textContent = 'Criando conta...';

      try {
        const response = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
          showFeedback('Conta criada com sucesso! Redirecionando...', 'success');
          setTimeout(() => { window.location.href = '/index.html'; }, 1500);
        } else if (response.status === 409) {
          showFeedback('Este nome de usuário já está em uso.', 'error');
          registerButton.disabled = false;
          registerButton.textContent = 'Criar conta';
        } else {
          showFeedback(data.error || 'Erro ao criar conta. Tente novamente.', 'error');
          registerButton.disabled = false;
          registerButton.textContent = 'Criar conta';
        }
      } catch {
        showFeedback('Erro de conexão. Tente novamente.', 'error');
        registerButton.disabled = false;
        registerButton.textContent = 'Criar conta';
      }
    }

    registerButton.addEventListener('click', register);

    [usernameInput, passwordInput, confirmPasswordInput, accessCodeInput].forEach(input => {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') register();
      });
    });
  </script>
</body>
</html>
