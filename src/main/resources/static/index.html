<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat em tempo real</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="chat-page">
    <section class="chat-app">
      <header class="chat-header">
        <div class="brand-block">
          <h1>Rádio Verde</h1>
        </div>

        <div class="status-pill" id="connectionStatus" hidden>
          <span class="status-dot"></span>
          <span id="connectionLabel">Conectando...</span>
        </div>
      </header>

      <section class="welcome-panel" id="welcomePanel">
        <div class="welcome-copy">
          <h2>Entre no chat para comecar a conversa</h2>
        </div>

        <div class="username-box">
          <label for="usernameInput">Seu nome</label>
          <div class="username-form">
            <input id="usernameInput" type="text" placeholder="Digite seu nome de usuario" maxlength="40" autocomplete="off">
          </div>

          <label for="passwordInput" style="margin-top:12px; display:block; color: #d6fbe5; font-weight:600;">Senha</label>
          <div class="username-form">
            <input id="passwordInput" type="password" placeholder="Digite sua senha" maxlength="80" autocomplete="off">
            <button id="enterButton" type="button">Entrar</button>
          </div>
        </div>
      </section>

      <section class="chat-room" id="chatRoom" hidden>
        <div class="chat-meta">
          <div>
            <p class="current-user">Voce esta conversando como <strong id="currentUsername"></strong></p>
          </div>
          <p class="message-count"><span id="messageCount">0</span> mensagem(ns)</p>
        </div>

        <div class="messages-area" id="messagesContainer">
          <div class="empty-state" id="emptyState">
            <span class="empty-badge">Pronto para conversar</span>
            <h3>Nenhuma mensagem ainda</h3>
            <p>As mensagens recebidas aparecerao aqui em tempo real.</p>
          </div>
        </div>

        <footer class="chat-composer">
          <label for="messageInput" style="position:absolute; left:-9999px; width:1px; height:1px; overflow:hidden;">Mensagem</label>
          <input id="messageInput" type="text" placeholder="Digite sua mensagem" autocomplete="off">
          <div class="composer-actions">
            <button id="sendButton" type="button">Enviar</button>
            <button id="recordButton" type="button" title="Enviar audio">Gravar/Enviar Áudio</button>
            <input id="audioFileInput" type="file" accept="audio/*" hidden>
          </div>
        </footer>
      </section>
    </section>
  </main>

  <script src="/script.js"></script>
</body>
</html>
