spring.application.name=ChatRealTime
server.port=8083

# HTTPS com certificado autoassinado (necessario para getUserMedia no celular via IP local)
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=chatrealtimeaps
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=chatrealtimeaps

# H2 and JPA
spring.datasource.url=jdbc:h2:mem:chatdb;
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=chatuser
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Enable H2 console for debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
